name: Performance Optimization

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  load-test:
    name: Load Test & Performance Gate
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tests/requirements.txt
        pip install pandas # For analysis script

    - name: Start Orchestrator Service
      run: |
        # Start in background
        # We assume Redis is mocked or handled by the service itself (MockRedis)
        uvicorn agents.crew-orchestrator.main:app --host 0.0.0.0 --port 8081 &
        sleep 5 # Wait for service to start

    - name: Run Locust Load Test
      run: |
        # Run for 140s (ramp up/down) headless, output CSV
        # This generates load_test_results_stats.csv
        locust -f tests/performance/locustfile.py \
               --headless \
               --host http://localhost:8081 \
               --csv=load_test_results \
               --run-time 140s \
               --stop-timeout 10 # Allow graceful shutdown
        
    - name: Analyze Results & Gate Check
      run: |
        # Check P99 < 800ms and Error Rate < 0.1%
        python tests/performance/check_results.py load_test_results_stats.csv
        
    - name: Upload Test Artifacts
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: performance-report
        path: load_test_results_*
