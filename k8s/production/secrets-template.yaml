apiVersion: v1
kind: Secret
metadata:
  name: hypercode-secrets
  namespace: hypercode
type: Opaque
# NOTE: These are placeholders. In production, use ExternalSecrets or SealedSecrets.
# Do NOT commit real base64 encoded secrets to Git.
stringData:
  OPENAI_API_KEY: "sk-..."
  ANTHROPIC_API_KEY: "sk-ant-..."
  DATABASE_URL: "postgresql://user:password@hypercode-db.endpoint:5432/hypercode"
  REDIS_URL: "redis://:password@hypercode-redis.endpoint:6379"
  JWT_SECRET: "change-me-in-production-please-seriously"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: hypercode-agent-sa
  namespace: hypercode
  annotations:
    # Associate with AWS IAM Role for EKS (IRSA)
    eks.amazonaws.com/role-arn: "arn:aws:iam::123456789012:role/HyperCodeAgentRole"
